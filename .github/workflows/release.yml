name: Release

# Ships a play-tested build to GitHub Pages and tags it v0.0.YYYYMMDDHHmmSS.
# Triggered on every push to main, or manually. Several releases per hour are fine;
# the concurrency group serialises them so deploys never collide.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'studio/**'
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute version
        id: ver
        run: echo "version=v0.0.$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Stamp version
        run: |
          V='${{ steps.ver.outputs.version }}'
          printf "// Bumped automatically by the release workflow. Format: v0.0.YYYYMMDDHHmmSS\nexport const VERSION = '%s';\n" "$V" > src/version.js
          sed -i "s|<div id=\"version\">[^<]*</div>|<div id=\"version\">$V</div>|" index.html

      - name: Play-test (headless browser gate)
        run: npm run playtest -- --keep-screenshot docs/playtest.png

      - name: Assemble site
        run: |
          rm -rf _site && mkdir -p _site
          cp -r index.html src assets _site/
          cp docs/playtest.png _site/playtest.png || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Tag release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V='${{ steps.ver.outputs.version }}'
          git config user.name "tidewake-studio[bot]"
          git config user.email "tidewake-studio@users.noreply.github.com"
          git tag -a "$V" -m "Release $V"
          git push origin "$V"
          gh release create "$V" \
            --title "Tidewake $V" \
            --notes "Automated, play-tested release. Play: ${{ steps.deploy.outputs.page_url }}" \
            docs/playtest.png
