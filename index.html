<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tidewake — an experimental age-of-sail pirate adventure</title>
  <meta name="description" content="Tidewake: an experimental, open 3D age-of-sail pirate adventure. Sail, explore, trade, and seek your fortune." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2214%22 font-size=%2214%22>%E2%9A%93</text></svg>" />
  <style>
    :root { color-scheme: dark; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a1c2b; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    #app { position: fixed; inset: 0; }
    canvas { display: block; }

    #hud {
      position: fixed; left: 12px; top: 12px; z-index: 10; max-width: 320px;
      color: #cfe8ff; text-shadow: 0 1px 3px rgba(0,0,0,.8);
      font-size: 13px; line-height: 1.5; pointer-events: none;
      background: rgba(7, 22, 38, .35); border: 1px solid rgba(120,180,230,.25);
      border-radius: 8px; padding: 8px 12px; backdrop-filter: blur(3px);
    }
    #hud b { color: #ffd98a; }
    #ledger #rank { color: #ffcf6e; }
    #ledger #infamy { color: #ff9a8a; }
    #ledger #standing { color: #87e0a4; }
    #ledger #rankprog { color: #7fa6c6; font-size: 11px; margin-left: 4px; }
    #toast.rankup { border-color: rgba(135,224,164,.6); }
    #toast.rankup .toast-title { color: #9be8b0; }
    #legend-badge {
      margin-top: 6px; display: none; font-size: 11px; letter-spacing: .03em;
      color: #2a1d06; background: linear-gradient(90deg, #ffe08a, #ffc24d);
      border: 1px solid rgba(255,233,160,.8); border-radius: 6px; padding: 2px 8px;
      font-weight: 700; box-shadow: 0 1px 6px rgba(0,0,0,.35); width: fit-content;
    }
    #legend-badge.show { display: block; }
    #legend {
      position: fixed; inset: 0; z-index: 30; display: grid; place-items: center;
      pointer-events: none; text-align: center; padding: 24px;
      background: radial-gradient(circle at 50% 42%, rgba(20,44,66,.78), rgba(6,16,26,.92) 75%);
      opacity: 0; transition: opacity .5s ease;
    }
    #legend.show { opacity: 1; }
    #legend .legend-card {
      max-width: min(92vw, 620px);
      background: rgba(9, 22, 36, .72); border: 1px solid rgba(255,217,138,.55);
      border-radius: 16px; padding: 28px 32px; backdrop-filter: blur(6px);
      box-shadow: 0 18px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(255,217,138,.15) inset;
      transform: translateY(10px) scale(.98); transition: transform .5s ease;
    }
    #legend.show .legend-card { transform: translateY(0) scale(1); }
    #legend .legend-kicker { color: #ffd98a; letter-spacing: .5em; font-size: 11px; opacity: .85; }
    #legend .legend-title {
      margin-top: 10px; color: #fff3d4; font-size: clamp(20px, 3.4vw, 32px); font-weight: 800;
      letter-spacing: .04em; line-height: 1.2; text-shadow: 0 2px 18px rgba(255,200,110,.45);
    }
    #legend .legend-proclaim { margin-top: 12px; color: #eaf6ff; font-size: 15px; font-style: italic; line-height: 1.5; }
    #legend .legend-flourish { margin-top: 10px; color: #bcd5ea; font-size: 13px; line-height: 1.5; }
    #legend .legend-both { margin-top: 12px; color: #9be8b0; font-size: 13px; line-height: 1.5; font-weight: 600; }
    #legend .legend-stats { margin-top: 16px; color: #ffd98a; font-size: 12px; letter-spacing: .02em; }
    #legend .legend-help { margin-top: 16px; color: #9fc4e6; font-size: 12px; }
    #legend .legend-help b { color: #ffd98a; }
    #windrose { display: flex; align-items: center; gap: 9px; margin-top: 7px; }
    #windrose svg { display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,.6)); }
    #pos { font-size: 12px; font-weight: 600; letter-spacing: .02em; transition: color .3s ease; }
    #pos.pos-good { color: #87e0a4; }
    #pos.pos-fair { color: #ffd98a; }
    #pos.pos-poor { color: #ff9a8a; }
    /* No CSS transition on the arrow: the SVG `rotate(deg 24 24)` attribute already pivots
       about the dial centre every frame. A CSS `transition` here would re-interpolate that
       transform against a mismatched transform-box/transform-origin, making the arrow orbit
       off-centre on each turn (#50). The heading updates per frame, so motion stays smooth. */
    #title {
      position: fixed; left: 0; right: 0; top: 18px; z-index: 10; text-align: center;
      color: #eaf6ff; letter-spacing: .35em; font-size: 14px; text-shadow: 0 2px 8px rgba(0,0,0,.7);
      pointer-events: none;
    }
    #help {
      position: fixed; left: 0; right: 0; bottom: 14px; z-index: 10; text-align: center;
      color: #9fc4e6; font-size: 12px; text-shadow: 0 1px 3px rgba(0,0,0,.8); pointer-events: none;
    }
    #version { position: fixed; right: 10px; bottom: 10px; z-index: 10; color: #6f97b8; font-size: 11px; pointer-events: none; }
    #toast {
      position: fixed; left: 50%; top: 64px; z-index: 12; transform: translate(-50%, -14px);
      min-width: 240px; max-width: min(90vw, 460px); text-align: center; pointer-events: none;
      color: #f3e6c4; background: rgba(7, 22, 38, .72); border: 1px solid rgba(255,217,138,.45);
      border-radius: 10px; padding: 10px 18px; backdrop-filter: blur(4px);
      box-shadow: 0 6px 24px rgba(0,0,0,.45);
      opacity: 0; transition: opacity .35s ease, transform .35s ease;
    }
    #toast.show { opacity: 1; transform: translate(-50%, 0); }
    #toast .toast-title { color: #ffd98a; font-weight: 700; font-size: 14px; letter-spacing: .04em; }
    #toast .toast-line { margin-top: 4px; font-size: 12.5px; line-height: 1.45; color: #dfeaf5; }
    #trade {
      position: fixed; right: 12px; bottom: 44px; z-index: 11; width: 290px;
      color: #e7f1fb; background: rgba(7, 22, 38, .62); border: 1px solid rgba(255,217,138,.4);
      border-radius: 10px; padding: 10px 12px; backdrop-filter: blur(5px);
      box-shadow: 0 8px 28px rgba(0,0,0,.5); font-size: 12px; pointer-events: none;
      opacity: 0; transform: translateY(8px); transition: opacity .3s ease, transform .3s ease;
    }
    #trade.show { opacity: 1; transform: translateY(0); }
    #trade .trade-h { color: #ffd98a; font-weight: 700; font-size: 13px; letter-spacing: .04em; }
    #trade .trade-standing { color: #87e0a4; font-weight: 600; font-size: 10.5px; letter-spacing: 0; }
    #trade .trade-sub { color: #bcd5ea; font-size: 11px; margin-top: 2px; }
    #trade .trade-cry { color: #9fd0a8; font-size: 11px; font-style: italic; margin: 4px 0 6px; min-height: 14px; }
    #trade .trade-t { width: 100%; border-collapse: collapse; }
    #trade .trade-t th { color: #7fa6c6; font-weight: 600; text-align: right; font-size: 10px; padding: 1px 4px; }
    #trade .trade-t th:nth-child(2) { text-align: left; }
    #trade .trade-t td { padding: 1px 4px; text-align: right; }
    #trade .trade-t td.tk { color: #ffd98a; font-weight: 700; text-align: center; }
    #trade .trade-t td.tg { text-align: left; }
    #trade .trade-t td.tb { color: #ff9a8a; }
    #trade .trade-t td.ts { color: #87e0a4; }
    #trade .trade-t td.th { color: #cfe8ff; }
    #trade .trow.spec td.tg::after { content: ' ·local'; color: #87e0a4; font-size: 9px; }
    #trade .trow.crave td.tg::after { content: ' ·wanted'; color: #ffd98a; font-size: 9px; }
    #trade .trade-msg { margin-top: 6px; min-height: 14px; color: #f3e6c4; font-size: 11px; }
    #trade .trade-help { margin-top: 4px; color: #8fb4d6; font-size: 10.5px; }
    #trade .trade-help b { color: #ffd98a; }
    #duel {
      position: fixed; left: 50%; top: 50%; z-index: 14; transform: translate(-50%, -50%) scale(.98);
      width: min(92vw, 460px); pointer-events: none;
      color: #f0e6d2; background: rgba(7, 18, 31, .9); border: 1px solid rgba(255,180,120,.5);
      border-radius: 12px; padding: 16px 18px; backdrop-filter: blur(6px);
      box-shadow: 0 12px 40px rgba(0,0,0,.6); font-size: 13px;
      opacity: 0; transition: opacity .25s ease, transform .25s ease;
    }
    #duel.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    #duel .duel-h { color: #ffb478; font-weight: 700; font-size: 15px; letter-spacing: .04em; text-align: center; }
    #duel .duel-bars { display: flex; gap: 12px; margin: 10px 0 6px; }
    #duel .duel-bar { flex: 1; }
    #duel .duel-bar .lab { font-size: 10.5px; color: #9fc4e6; display: flex; justify-content: space-between; margin-bottom: 2px; }
    #duel .duel-bar .meter { height: 9px; border-radius: 5px; background: rgba(255,255,255,.1); overflow: hidden; }
    #duel .duel-bar .fill { height: 100%; transition: width .3s ease; }
    #duel .duel-bar.you .fill { background: linear-gradient(90deg, #6fc4ff, #87e0a4); }
    #duel .duel-bar.them .fill { background: linear-gradient(90deg, #ffb478, #ff7a6a); }
    #duel .duel-line { font-style: italic; color: #ffe0b0; text-align: center; min-height: 34px;
      margin: 8px 4px 10px; line-height: 1.4; }
    #duel .duel-opts { list-style: none; display: grid; gap: 5px; }
    #duel .duel-opts li { background: rgba(255,255,255,.05); border: 1px solid rgba(255,180,120,.22);
      border-radius: 7px; padding: 6px 9px; line-height: 1.35; }
    #duel .duel-opts li b { color: #ffb478; margin-right: 6px; }
    #duel .duel-help { margin-top: 9px; text-align: center; color: #8fb4d6; font-size: 10.5px; }
    #duel .duel-help b { color: #ffb478; }
    #challenge-prompt {
      position: fixed; left: 50%; bottom: 70px; z-index: 11; transform: translate(-50%, 8px);
      color: #ffb478; background: rgba(7, 18, 31, .7); border: 1px solid rgba(255,180,120,.45);
      border-radius: 8px; padding: 6px 14px; font-size: 12px; pointer-events: none;
      opacity: 0; transition: opacity .2s ease, transform .2s ease;
    }
    #challenge-prompt.show { opacity: 1; transform: translate(-50%, 0); }
    #minimap {
      position: fixed; left: 12px; bottom: 40px; z-index: 11; pointer-events: none;
      width: 150px; height: 150px; border-radius: 10px;
      background: rgba(7, 22, 38, .35); border: 1px solid rgba(120,180,230,.25);
      backdrop-filter: blur(3px); box-shadow: 0 6px 22px rgba(0,0,0,.4);
    }
    #audio-toggle {
      position: fixed; right: 12px; top: 12px; z-index: 11; pointer-events: auto;
      width: 34px; height: 34px; display: grid; place-items: center; cursor: pointer;
      font-size: 16px; line-height: 1; color: #cfe8ff;
      background: rgba(7, 22, 38, .35); border: 1px solid rgba(120,180,230,.25);
      border-radius: 8px; backdrop-filter: blur(3px); user-select: none;
      transition: background .15s ease, border-color .15s ease;
    }
    #audio-toggle:hover { background: rgba(7, 22, 38, .55); border-color: rgba(120,180,230,.45); }
    #boot {
      position: fixed; inset: 0; z-index: 20; display: grid; place-items: center;
      background: radial-gradient(circle at 50% 40%, #123249, #07131f 80%); color: #cfe8ff;
      font-size: 13px; letter-spacing: .3em; transition: opacity .6s ease;
    }
    #boot.hidden { opacity: 0; pointer-events: none; }

    /* ---- Touch / mobile controls (#17) ----------------------------------- */
    /* No browser scroll/zoom on the play surface; the controls own their gestures. */
    #app canvas { touch-action: none; }
    #touch-controls { display: none; }
    body.touch #touch-controls { display: block; }
    #touch-controls .tc-cluster {
      position: fixed; z-index: 13; display: flex; gap: 12px; pointer-events: none;
      bottom: calc(22px + env(safe-area-inset-bottom, 0px));
    }
    #touch-controls .tc-throttle { right: 18px; flex-direction: column; }
    #touch-controls .tc-steer { left: 18px; }
    #touch-controls .tc-action { left: 50%; transform: translateX(-50%); bottom: calc(96px + env(safe-area-inset-bottom, 0px)); }
    #touch-controls .tc-btn {
      pointer-events: auto; touch-action: none; user-select: none; -webkit-user-select: none;
      width: 62px; height: 62px; display: grid; place-items: center; font-size: 23px; line-height: 1;
      color: #cfe8ff; background: rgba(7, 22, 38, .42); border: 1px solid rgba(120,180,230,.4);
      border-radius: 14px; backdrop-filter: blur(3px); cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.4); -webkit-tap-highlight-color: transparent;
      transition: background .1s ease, border-color .1s ease, transform .1s ease;
    }
    #touch-controls .tc-btn.on { background: rgba(60,120,180,.62); border-color: rgba(180,220,255,.75); color: #fff; transform: scale(.94); }
    #touch-controls .tc-f { width: 68px; height: 68px; font-size: 27px; color: #ffb478; border-color: rgba(255,180,120,.5); }
    #touch-controls .tc-f.on { background: rgba(140,90,45,.62); border-color: rgba(255,200,150,.8); color: #fff; }
    /* On touch, keyboard hints make no sense and the corner panels get out of the way. */
    body.touch #help { display: none; }
    body.touch #minimap { left: auto; right: 12px; top: 54px; bottom: auto; }
    body.touch #version { left: 50%; right: auto; transform: translateX(-50%); bottom: 5px; }
    body.touch #trade { bottom: calc(96px + env(safe-area-inset-bottom, 0px)); }
    /* Make the trade/duel panels tappable only while shown, so the center of the
       screen stays free for camera drag when they're hidden. */
    body.touch #trade.show, body.touch #duel.show { pointer-events: auto; }
    #trade .trow td, #duel .duel-opts li { cursor: pointer; }
    body.touch #challenge-prompt { bottom: calc(170px + env(safe-area-inset-bottom, 0px)); }
    @media (max-width: 560px) {
      #hud { font-size: 11px; max-width: 64vw; padding: 6px 9px; }
      #title { font-size: 11px; letter-spacing: .22em; top: 12px; }
      #trade { width: min(82vw, 290px); }
      #minimap { width: 112px; height: 112px; }
    }

    a { color: #ffd98a; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="title">⚓ T I D E W A K E</div>
  <div id="hud">
    <div>Heading <b><span id="heading">0</span>°</b></div>
    <div>Speed <b><span id="speed">0.0</span></b> kn</div>
    <div>Wind <b><span id="wind">—</span></b></div>
    <div>Coins <b><span id="coins">100</span></b> · Hold <b><span id="cargo">0/12</span></b></div>
    <div id="ledger" title="⚔ Infamy (pirate path) · ⚖ Standing (governor path)">⚔ <b><span id="infamy">0</span></b> · ⚖ <b><span id="standing">0</span></b> · <b><span id="rank">Bilge-rat</span></b><span id="rankprog"></span></div>
    <div id="legend-badge" role="status"></div>
    <div id="windrose">
      <svg width="48" height="48" viewBox="0 0 48 48" aria-label="Wind relative to ship">
        <circle cx="24" cy="24" r="20" fill="rgba(7,22,38,.35)" stroke="rgba(120,180,230,.45)" stroke-width="1.5" />
        <!-- bow marker: the ship always points up in this ship-relative dial -->
        <path d="M24 1.5 l4.5 7.5 l-9 0 z" fill="#ffd98a" />
        <!-- wind-flow arrow: rotates as you steer; points the way the wind pushes -->
        <g id="windarrow">
          <line x1="24" y1="38" x2="24" y2="13" stroke="#7fc4ff" stroke-width="2.5" stroke-linecap="round" />
          <path d="M24 8 l5 8 l-10 0 z" fill="#7fc4ff" />
        </g>
        <circle cx="24" cy="24" r="2.4" fill="#cfe8ff" />
      </svg>
      <span id="pos" class="pos-good">—</span>
    </div>
  </div>
  <div id="trade" aria-live="polite"></div>
  <div id="challenge-prompt" role="status">⚔ Press <b>F</b> to hail and duel</div>
  <div id="duel" role="dialog" aria-live="polite"></div>
  <div id="toast" role="status" aria-live="polite"></div>
  <div id="legend" role="dialog" aria-live="polite"></div>
  <canvas id="minimap" width="150" height="150" aria-label="Minimap of nearby islands, ports and ships"></canvas>
  <button id="audio-toggle" type="button" aria-pressed="false" aria-label="Mute" title="Mute (m)">🔊</button>
  <div id="help">W/S throttle &nbsp;·&nbsp; A/D steer &nbsp;·&nbsp; drag to look &nbsp;·&nbsp; F duel a ship (1–4 to jab) &nbsp;·&nbsp; dock to trade (1–5 buy, Shift sell) &nbsp;·&nbsp; M mute &nbsp;·&nbsp; N new voyage</div>
  <div id="version">v0.0.0-dev</div>

  <!-- On-screen touch controls (#17): hold to throttle/steer, tap to hail. Shown only
       on touch / coarse-pointer devices via the `touch` class on <body> (input.js). They
       feed the SAME key set the keyboard does, so every system works unchanged. -->
  <div id="touch-controls" aria-hidden="true">
    <div class="tc-cluster tc-steer">
      <button class="tc-btn" type="button" data-hold="a" aria-label="Steer to port (left)">◀</button>
      <button class="tc-btn" type="button" data-hold="d" aria-label="Steer to starboard (right)">▶</button>
    </div>
    <div class="tc-cluster tc-throttle">
      <button class="tc-btn" type="button" data-hold="w" aria-label="Throttle up">▲</button>
      <button class="tc-btn" type="button" data-hold="s" aria-label="Throttle down">▼</button>
    </div>
    <div class="tc-cluster tc-action">
      <button class="tc-btn tc-f" type="button" data-tap="f" aria-label="Hail and duel a nearby ship">⚔</button>
    </div>
  </div>

  <div id="boot">CASTING OFF…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
